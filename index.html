<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Huerto el Mamey - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-amber-50 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-amber-100">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-amber-100 rounded-full text-amber-800 text-3xl mb-2">
                ☕
            </div>
            <h1 class="text-2xl font-bold text-stone-800">Punto de Venta</h1>
            <p class="text-stone-500 text-sm">Café Huerto el Mamey</p>
        </div>

        <div id="alert-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm text-center">
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-stone-700 mb-1">Correo Electrónico</label>
                <input type="email" id="correo" required
                    class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
                    placeholder="ejemplo@huertomamey.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-stone-700 mb-1">Contraseña</label>
                <input type="password" id="contrasena" required
                    class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-2.5 px-4 rounded-lg shadow transition duration-200 transform active:scale-[0.98]">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
