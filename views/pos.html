<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Huerto el Mamey - Caja</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Icono para la pestaña del navegador -->
    <link rel="icon" type="image/jpg" href="assets/img/logo.jpg">
</head>
<body class="bg-stone-100 min-h-screen flex flex-col font-sans">

    <header class="bg-amber-800 text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">☕</span>
            <h1 class="text-xl font-bold tracking-wide">Café Huerto el Mamey</h1>
        </div>
        <div class="flex items-center space-x-4">
            <span id="user-display" class="text-sm bg-amber-700 px-3 py-1 rounded-full font-medium">Cajero</span>
            
            <a href="dashboard.html" class="text-sm bg-amber-900 hover:bg-stone-800 px-3 py-1 rounded-lg transition font-semibold flex items-center space-x-1">
                <span>📊 Dashboard</span>
            </a>
            
            <button id="btn-logout" class="text-sm bg-red-600 hover:bg-red-700 px-3 py-1 rounded-lg transition font-semibold">
                Salir
            </button>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-4 p-4 overflow-hidden">
        
        <section class="lg:col-span-7 bg-white rounded-2xl shadow-sm p-4 flex flex-col h-[calc(100vh-120px)]">
            <div class="mb-4">
                <input type="text" id="search-input" 
                    placeholder="🔍 Buscar café por nombre o presentación..." 
                    class="w-full px-4 py-2.5 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 transition">
            </div>

            <div id="products-grid" class="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 pr-1">
                </div>
        </section>

        <section class="lg:col-span-5 bg-white rounded-2xl shadow-sm p-4 flex flex-col h-[calc(100vh-120px)] border border-stone-200">
            <h2 class="text-lg font-bold text-stone-800 mb-3 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <span>📋 Ticket de Venta</span>
                    <span id="items-count" class="text-xs bg-stone-200 text-stone-700 px-2 py-0.5 rounded-full">0 artículos</span>
                </div>
                <button onclick="vaciarTicket()" class="text-xs text-red-600 hover:text-red-800 font-semibold bg-red-50 hover:bg-red-100 px-2 py-1 rounded-lg transition cursor-pointer">
                    🗑️ Vaciar Todo
                </button>
            </h2>

            <div class="flex-1 overflow-y-auto border border-stone-100 rounded-xl mb-4">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-50 text-stone-600 text-xs font-semibold uppercase border-b border-stone-200">
                            <th class="p-3">Café</th>
                            <th class="p-3 text-center">Cant.</th>
                            <th class="p-3 text-right">Total</th>
                            <th class="p-3 text-center"></th>
                        </tr>
                    </thead>
                    <tbody id="cart-table-body" class="text-sm text-stone-700 divider-y divider-stone-100">
                        </tbody>
                </table>
            </div>

            <div class="bg-stone-50 p-4 rounded-xl space-y-3 border border-stone-100">
                <div class="flex justify-between items-center text-stone-600">
                    <span>Método de Pago:</span>
                    <select id="payment-method" class="bg-white border border-stone-300 rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500">
                        <option value="efectivo">💵 Efectivo</option>
                        <option value="transferencia">📱 Transferencia</option>
                        <option value="tarjeta">💳 Tarjeta</option>
                    </select>
                </div>
                
                <div id="cash-payment-group" class="flex justify-between items-center text-stone-600">
                    <span>Efectivo Recibido:</span>
                    <input type="number" id="cash-received" min="0" step="0.5" placeholder="$0.00"
                        class="w-24 bg-white border border-stone-300 rounded-lg px-2 py-1 text-sm text-right focus:outline-none focus:ring-1 focus:ring-amber-500">
                </div>

                <div class="border-t border-stone-200 pt-2 flex justify-between items-center text-xl font-black text-stone-900">
                    <span>Total a Pagar:</span>
                    <span id="cart-total">$0.00</span>
                </div>

                <button id="btn-checkout" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md transition transform active:scale-[0.99] mt-2 cursor-pointer text-center">
                    🛒 Registrar y Cobrar Venta
                </button>
            </div>
        </section>

    </main>

    <script src="../js/ventas.js"></script>
</body>
</html>
