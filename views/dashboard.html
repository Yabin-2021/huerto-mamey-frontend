<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Huerto el Mamey - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Icono para la pestaña del navegador -->
    <link rel="icon" type="image/jpg" href="assets/img/logo.jpg">
</head>
<body class="bg-stone-100 min-h-screen flex flex-col font-sans">

    <header class="bg-stone-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">📊</span>
            <h1 class="text-xl font-bold tracking-wide">Panel de Administración</h1>
        </div>
        <div class="flex items-center space-x-4">
            <a href="inventario.html" class="bg-stone-700 hover:bg-stone-600 text-white text-sm font-bold px-3 py-1.5 rounded-lg transition">
                📦 Ver Almacén / Inventario
            </a>
            <a href="pos.html" class="bg-amber-700 hover:bg-amber-800 text-white text-sm font-bold px-3 py-1.5 rounded-lg transition">
                🛒 Ir a Caja (POS)
            </a>
            <button id="btn-logout" class="text-sm bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-lg transition font-semibold cursor-pointer">
                Cerrar Sesión
            </button>
        </div>
    </header>

    <main class="flex-1 p-6 max-w-7xl w-full mx-auto space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-stone-200 flex items-center space-x-4">
                <div class="p-4 bg-emerald-100 text-emerald-800 text-2xl rounded-xl">💰</div>
                <div>
                    <p class="text-sm font-medium text-stone-500 uppercase tracking-wider">Ventas de Hoy</p>
                    <h3 id="lbl-ingresos-hoy" class="text-2xl font-black text-stone-800">$0.00</h3>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-xs border border-stone-200 flex items-center space-x-4">
                <div class="p-4 bg-blue-100 text-blue-800 text-2xl rounded-xl">🧾</div>
                <div>
                    <p class="text-sm font-medium text-stone-500 uppercase tracking-wider">Tickets Emitidos</p>
                    <h3 id="lbl-tickets-hoy" class="text-2xl font-black text-stone-800">0</h3>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-xs border border-stone-200 flex items-center space-x-4">
                <div class="p-4 bg-red-100 text-red-800 text-2xl rounded-xl">⚠️</div>
                <div>
                    <p class="text-sm font-medium text-stone-500 uppercase tracking-wider">Alertas de Stock</p>
                    <h3 id="lbl-alertas-count" class="text-2xl font-black text-stone-800">0 productos</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="bg-white p-5 rounded-2xl shadow-xs border border-stone-200 flex flex-col">
                <h2 class="text-lg font-bold text-stone-800 mb-4 flex items-center space-x-2">
                    <span>🔥 Top Cafés Más Vendidos</span>
                </h2>
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="bg-stone-50 text-stone-600 font-semibold border-b border-stone-200">
                                <th class="p-3">Producto</th>
                                <th class="p-3 text-center">Cantidad</th>
                                <th class="p-3 text-right">Recaudado</th>
                            </tr>
                        </thead>
                        <tbody id="table-top-products" class="divide-y divide-stone-100 text-stone-700">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-xs border border-stone-200 flex flex-col">
                <h2 class="text-lg font-bold text-stone-800 mb-4 text-red-600 flex items-center space-x-2">
                    <span>🚨 Cafés con Inventario Crítico</span>
                </h2>
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="bg-stone-50 text-stone-600 font-semibold border-b border-stone-200">
                                <th class="p-3">Café</th>
                                <th class="p-3 text-center">Stock Actual</th>
                                <th class="p-3 text-center">Mínimo</th>
                            </tr>
                        </thead>
                        <tbody id="table-stock-alerts" class="divide-y divide-stone-100 text-stone-700">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="../js/dashboard.js"></script>
</body>
</html>
